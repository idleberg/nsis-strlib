name: Release

on:
  push:
    tags:
      - "v*"

env:
  INSTALL_NAME: StrLib

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install NSIS
        run: sudo apt-get update && sudo apt-get install -y nsis

      - name: Build installer
        run: makensis -DINSTALLNAME=${{ env.INSTALL_NAME }} installer.nsi

      - name: Create archive
        run: zip ${{ env.INSTALL_NAME }}-v${{ steps.version.outputs.version }}.zip ${{ env.INSTALL_NAME }}.exe LICENSE

      - name: Create release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          files: ${{ env.INSTALL_NAME }}-v${{ steps.version.outputs.version }}.zip
